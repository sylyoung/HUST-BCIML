  seeds: 3
  source: "EA ablation of He & Wu 2020 — EA lifts +2.73 over this baseline"
  note: "the no-alignment control; EA-EEGNet beats it by +2.73. Also the baseline for the Channel-Reflection augmentation table (that transform must run in electrode space, before any alignment)."

