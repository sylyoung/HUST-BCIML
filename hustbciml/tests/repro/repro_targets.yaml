# Reproduction targets — measurement integrity.
# Each ported algorithm must reproduce a published-range number on BNCI2014001
# (the one benchmark dataset), cross-subject. A row records what hustbciml measured
# and the reference range it should fall in. Update `reproduced` when re-measured.
#
# Protocol for all rows below: cross_subject LOSO, 9 subjects, 2-class (L/R),
# EEGNet backbone and 100 epochs unless noted (the classical track is
# network-free). The `reproduced` values are the 3-SEED (seeds 1, 2, 3) production
# run on hust-gpu-60022, 2026-07-13 (CUDA for the neural methods, CPU for the
# classical track): `reproduced` is the mean over seeds and `reproduced_std` is
# the std ACROSS seeds (reproducibility). This is the full 34-method internally
# consistent benchmark — the 25 coverage methods, five earlier ports (EA-DBConformer,
# CSDA-EEGNet, ABAT, BFT, MVCNet), and four lab-method ports (CSP-Net, DJP-MMD, LSFT,
# MSDT).
#
# Note on the base: the earlier single-seed (seed 1) EA-EEGNet value was 75.00; the
# 3-seed mean is 72.07 ± 1.58 (seed 1 was a lucky draw). Because most methods are
# measured as a delta against this base, the 3-seed base widened every delta — the
# reason a multi-seed run matters. All 25 prior methods still fall in range.
#
# Faithful negative results, kept because integrity means recording what a method
# actually does: EEG Conformer lands below EEGNet (transformers are data-hungry on
# ~144 trials/subject).
# BFT carries a disclosed learned-module approximation (see its note).

EA-EEGNet:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 72.07          # 3-seed mean, server, CUDA, 2026-07-13 (seed-1-only was 75.00)
  reproduced_std: 1.58       # std across seeds 1,2,3
  reference_range: [70, 78]  # offline EA + EEGNet cross-subject baseline
  seeds: 3
  source: "He & Wu 2020 (Euclidean Alignment); DeepTransferEEG T-TIME paper baseline"
  note: "canonical reference (EA · no-aug · EEGNet · Linear · ERM). The 3-seed mean (72.07) is the honest base; it is the number every controlled delta is measured against. EA lifts +2.73 over no-alignment (69.34)."

