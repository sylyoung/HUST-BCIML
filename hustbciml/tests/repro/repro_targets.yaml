# --- Four lab-method ports, integrated 2026-07-13 (3-seed). CSP-Net is a backbone
# (single-axis), DJP-MMD a strategy (single-axis), LSFT and MSDT classical source-free
# transfer methods (their own tangent-space alignment; shown against the EA-EEGNet
# reference). Citations and reference numbers verified against the papers (Zotero). ---

CSP-Net:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 76.13          # 3-seed mean, server, CUDA, 2026-07-13
  reproduced_std: 0.85
  reference_range: [72, 82]  # CSP-initialized EEGNet, cross-subject; the paper's CSP-Net-2 consistently beats its EEGNet backbone
  seeds: 3
  source: "Jiang, Meng, Chen, Xu & Wu, Knowledge-Based Systems 305:112668, 2024 (CSP-Net), doi 10.1016/j.knosys.2024.112668; github.com/jxgogo/CSP-Net — CSP-Net-2 (spatial-layer replacement), fixed CSP filters"
  note: "backbone axis, lab method. EEGNet whose depthwise spatial conv is initialized with CSP filters from the EA-aligned source and then frozen (CSP-Net-2-fix). Leads the backbone table: +4.06 over EEGNet (72.07), above deep DBConformer (76.03). The paper's own MI2C (2-class 2a, 9 subjects, 144 trials/subject) is this benchmark's BNCI2014001; it reports CSP-Nets consistently improving over their CNN backbones in both within- and cross-subject MI (within-subject 4-class 2a: EEGNet 63.50 -> 71.91), with the cross-subject gains figure-encoded and smaller than within-subject — the measured +4.06 is consistent. CSP filters are estimated on raw epochs but overwrite the post-temporal-conv depthwise layer, an approximation the paper adopts."

DJP-MMD:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 72.20          # 3-seed mean, server, CUDA, 2026-07-13
  reproduced_std: 0.77
  reference_range: [68, 78]  # behavior band — no published EEG number (paper is image-domain); a gradient MMD strategy near the ERM baseline
  seeds: 3
  source: "Zhang & Wu, IJCNN 2020 (Discriminative Joint Probability MMD); github.com/chamwen/DaNN_DJP — image-domain paper (Office/Caltech), no EEG benchmark"
  note: "strategy axis, lab method. Adds the DJP-MMD discrepancy (M_T - mu*M_D over the joint P(X,Y), mu=0.1) to the source cross-entropy over the shared transductive_train skeleton (same family as DAN/JAN/MDD). The paper evaluates DJP-MMD ONLY on image domain adaptation, so there is no published EEG number — the range is a behavior band, not a paper value. On EA + EEGNet it lands +0.13 over the ERM baseline (72.07): a faithful, honest near-baseline result for an image-domain MMD ported to a deep-gradient EEG strategy. Kept as measured. Held-out-source HP selection (lr 1e-3, mu 0.3) lifts it to 73.10 in the benchmark transfer table (2026-07-19 campaign); this repro row keeps the faithful default-config (mu 0.1) number."

LSFT:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 74.23          # 3-seed mean (deterministic), server, CPU, 2026-07-13
  reproduced_std: 0.00       # deterministic: identical across seeds
  reference_range: [70, 80]  # paper reports LSFT 75.15 on MI2-2 (2-class 2a, LOSO) — Zhang & Wu TCDS 2022, Table III
  seeds: 3
  source: "Zhang & Wu, IEEE Trans. Cognitive and Developmental Systems 2022 (Lightweight Source-Free Transfer, LSFT); github.com/chamwen/LSFT — CA+LSFT (LDA+LR voting) config"
  note: "classical source-free transfer, lab method. Pretrained source classifiers vote to pseudo-label the target; low-disagreement trials form a virtual intermediate source; an iterative DJP-MMD subspace adaptation + shrinkage-LDA relabeling produces the final labels — all on Riemannian tangent-space features, no raw source data at transfer time (transductive). Deterministic across seeds (std 0.00). The paper's Table III on MI2-2 (2-class 2a, cross-subject LOSO — this benchmark's exact setup) reports LSFT 75.15; the measured 74.23 is -0.92, a faithful reproduction. The paper's own EEGNet on MI2-2 (69.14) matches this benchmark's no-alignment EEGNet (69.34), cross-validating the comparison. Uses its own Riemannian centroid alignment, so the preset aligner is Identity. Held-out-source HP selection (lsft_dim 10, mu 0.1) lifts it to 74.77 in the benchmark classical-transfer table (2026-07-19); this repro row keeps the faithful default-config number."

MSDT:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 73.33          # 3-seed mean, server, CPU, 2026-07-13
  reproduced_std: 0.80
  reference_range: [70, 80]  # paper reports MSDT-G 76.54 on MI2 (2-class 2a, LOSO) — Zhang, Wang & Wu TNSRE 2022, Table IV
  seeds: 3
  source: "Zhang, Wang & Wu, IEEE Trans. Neural Systems and Rehabilitation Engineering 2022 (Multi-Source Decentralized Transfer, MSDT); github.com/chamwen/MSDT — gray-box MSDT-G (target_adapt_msdt_mi), use_weight on"
  note: "multi-source classical source-free transfer, lab method. Under LOSO each of the other 8 subjects is one source domain: each trains its own MLP on tangent-space features (decentralized, no source pooling); the target adapts the source extractors (classifiers frozen) by information maximization + a source-inconsistency term with entropy-based domain weighting, and predicts the weighted ensemble. The paper's Table IV on MI2 (2-class 2a, cross-subject LOSO — this benchmark's setup) reports MSDT-G 76.54; the measured 73.33 is -3.21, a faithful port (some upstream hyperparameters are unspecified). The upstream mixup is a disclosed no-op in the authors' code (its gradients are wiped before the optimizer step) and is omitted here, reproducing the effective optimization rather than 'fixing' it. Tangent map is the only alignment, so the preset aligner is Identity."

# --- Six new methods, integrated 2026-07-18 (3-seed). Two backbones (TIE-EEGNet,
# KDFNet), two neural transfer strategies (MDMAML, ASFA), and one network-free
# classical transfer (MEKT). Backbone rows are the canonical fixed-HP run (EA + ERM,
# lr 1e-3, 100 epochs), matching the other backbone cards; the Network table in
# RESULTS.md / benchmark.yml instead reports the per-architecture-tuned run. All are
# lab methods (D. Wu). SAFE (federated privacy) is display-only in benchmark.yml —
# like FedBS / FedAvg it has no single-dataset card. ---

EA-TIEEEGNet:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 72.51          # 3-seed mean, server, CUDA, 2026-07-18 (fixed HP: lr 1e-3, 100 epochs)
  reproduced_std: 0.24
  reference_range: [66, 78]  # EEGNet-family backbone on 2014001; the paper targets seizure, so a behavior band
  seeds: 3
  source: "Peng et al., IEEE Trans. Neural Systems and Rehabilitation Engineering 2022 (TIE-EEGNet), doi 10.1109/TNSRE.2022.3204540 — the paper targets seizure subtype classification, so there is no motor-imagery number to target; the range is a behavior band"
  note: "backbone axis, lab method. EEGNet with its first temporal convolution replaced by a time-information-enhanced (TIE) convolution — a fixed sinusoidal time-positional embedding added before temporal filtering. At the shared fixed HP it matches the EEGNet baseline (72.51 vs 72.53); with per-architecture LR tuning it reaches 73.51 in the Network table. Uses the benchmark EEGNet capacity (F1 4 / F2 8); the paper's F1 8 / F2 16 is noted as the reference config."

EA-KDFNet:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 70.88          # 3-seed mean, server, CUDA, 2026-07-18 (fixed HP: lr 1e-3, 100 epochs)
  reproduced_std: 0.32
  reference_range: [64, 78]  # knowledge-init CNN backbone on 2014001; the paper's datasets/protocol differ, so a behavior band
  seeds: 3
  source: "Jiang et al., Information Sciences 2026 (KDFNet, knowledge-data fusion network), doi 10.1016/j.ins.2025.123001 — a motor-imagery method, but the paper's datasets and protocol differ, so the range is a behavior band"
  note: "backbone axis, lab method. An FBCSP-mirroring CNN: a windowed-sinc FIR filter bank (data-free temporal init) and per-band CSP filters (initialized on the EA-aligned source) form the spatial layer, then the whole network is fine-tuned end-to-end. Lands below the EEGNet baseline on all three datasets (-1.65 here, the weakest backbone) — an honest below-baseline result. The paper's head learning-rate init is omitted (the linear head trains from scratch, documented); its tuned best LR (1e-3) coincides with the canonical HP, so its tuned and fixed-HP numbers agree."

MEKT:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 76.54          # 3-seed mean (deterministic); local, env-validated vs committed core, 2026-07-19
  reproduced_std: 0.00       # network-free, deterministic across seeds
  reference_range: [70, 82]  # full manifold-embedded transfer (Sec-III-C projection included); paper datasets/protocol differ, behavior band
  seeds: 3
  source: "Zhang & Wu, IEEE Trans. Neural Systems and Rehabilitation Engineering 2020 (Manifold Embedded Knowledge Transfer, MEKT), doi 10.1109/TNSRE.2020.2985996"
  note: "classical (network-free) transfer, lab method. FULL MEKT: per-subject centroid alignment (CA) + Riemannian tangent-space features + the Sec-III-C domain-adaptation projection (joint-probability MMD + source LDA-scatter + target-locality graph + B~A coupling, solved by a generalized eigendecomposition with EM pseudo-label refinement) + shrinkage-LDA; deterministic (std 0.00). The projection is ported from the authors' code (chamwen/MEKT) via TBC-TJU/MetaBCI's mekt_kernel; it lifts this dataset +6.25 over the CA-tangent core (BNCI2014002 +4.86, BNCI2015001 -0.21). An earlier reading omitted the projection after a buggy attempt collapsed it (~58%); the faithful port improves. No target-label leakage (target features unlabeled; pseudo-labels from the classifier). Lands +4.47 above the EA-EEGNet reference here. Its own CA means the preset aligner is Identity. Requires pyriemann + scikit-learn + scipy."

MDMAML:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 75.13          # 3-seed mean, server, CUDA, 2026-07-18
  reproduced_std: 0.38
  reference_range: [70, 80]  # meta-learned forward-only EEGNet init on 2014001
  seeds: 3
  source: "Li et al., IEEE Computational Intelligence Magazine 2022 (meta-learning for fast, privacy-preserving source knowledge transfer), doi 10.1109/MCI.2022.3199622"
  note: "strategy axis, lab method. Domain-paired first-order model-agnostic meta-learning (MAML) across the source subjects (M/2 domain pairs per episode, one inner step, Adam meta-optimizer); the meta-trained EEGNet is applied to the target with NO target fine-tuning (forward-only). +3.06 over the ERM baseline on BNCI2014001 — the standout new transfer method here — though it slips just below ERM on the two other datasets (see RESULTS.md), where the source pool is smaller. The outer Adam meta-optimizer fixed an earlier near-chance plain-SGD variant."

ASFA:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 73.28          # 3-seed mean, server, CUDA, 2026-07-18
  reproduced_std: 0.51
  reference_range: [68, 80]  # source-free adaptation on 2014001
  seeds: 3
  source: "Xia et al., IEEE Trans. Biomedical Engineering 2022 (privacy-preserving / source-free domain adaptation, ASFA), doi 10.1109/TBME.2022.3168570"
  note: "strategy axis, lab method. Source-free adaptation: the classifier head is frozen and only the feature extractor is adapted on the unlabeled target, by reducing a Tsallis-entropy prediction-uncertainty objective (temperature rescale, per-instance entropy reweighting, per-class normalization) plus a consistency regularizer from a DropMin auxiliary head — no source data at adapt time. +1.21 over the ERM baseline, the mildest of the source-free family (ISFDA and SHOT are stronger) but among the most stable across seeds. The paper's backbone is a tangent-space MLP; the adaptation OBJECTIVE is ported onto EA-EEGNet so the comparison stays on the shared backbone (disclosed)."

PAT:
  dataset: BNCI2014001
  protocol: cross_subject
  metric: accuracy
  reproduced: 73.53          # 3-seed mean, server, CUDA, 2026-07-19
  reproduced_std: 0.95
  reference_range: [70, 82]  # scaling-aug + global-ε PGD adversarial training over EA-EEGNet; extends ABAT
  seeds: 3
  source: "Chen, Jia, Tu & Wu, Fundamental Research 2026 (PAT, Privacy-Preserving Adversarial Transfer), doi 10.1016/j.fmre.2026.04.034; github.com/xqchen914/PAT"
  note: "strategy axis, lab method. Extends ABAT: after a clean warmup, each EA-aligned batch is amplitude-scaled (X·(1±0.05)) then perturbed by a global-ε L∞ PGD attack (noisy uniform init, eps 0.03, alpha 0.005, 10 steps, warmup 0.2); target never used, so source-only (privacy-preserving). +1.46 over ERM 72.07. Only the benign-accuracy training strategy is ported (on par with ABAT); the paper's federated/robustness protocol and 5-dataset/3-scenario evaluation are out of scope for this single-axis row (disclosed)."
