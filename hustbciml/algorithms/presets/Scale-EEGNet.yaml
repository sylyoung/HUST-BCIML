# EA + amplitude-scaling augmentation + EEGNet, trained with ERM.
# Augmentation-axis baseline: each trial is multiplied by a coefficient close to
# one (Freer & Yang 2020) on the EA-aligned EEGNet+ERM setup. Compare against
# EA-EEGNet (no augmentation).
aligner: EA
augmenter: Scaling
backbone: EEGNet
head: Linear
strategy: ERM
epochs: 100
batch_size: 32
lr: 0.001
