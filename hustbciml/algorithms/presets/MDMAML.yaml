# MDMAML — Multi-Domain Model-Agnostic Meta-Learning (Li et al., IEEE CIM 2022).
# Privacy-preserving (source-free) transfer: meta-learn EA-EEGNet over the source
# subjects (each subject one domain) by domain-paired first-order MAML, then apply the
# meta-model to the target subject forward-only (NO target fine-tuning). Inner LR
# alpha=0.001 and meta LR beta=0.001 are fixed in the strategy; --epochs sets the
# number of meta-training epochs (paper: 200).
aligner: EA
augmenter: Identity
backbone: EEGNet
head: Linear
strategy: MDMAML
epochs: 200
batch_size: 32
lr: 0.001
