# EA + ADFCNN (Tao et al.) + Linear, trained with ERM.
# Network-axis comparison: an attention-based dual-scale fusion CNN that runs
# two spectral-spatial pathways and merges them with self-attention, on the same
# EA-aligned ERM setup as the other backbones.
aligner: EA
augmenter: Identity
backbone: ADFCNN
head: Linear
strategy: ERM
epochs: 100
batch_size: 32
lr: 0.001
