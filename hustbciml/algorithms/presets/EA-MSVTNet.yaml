# EA + MSVTNet (Liu et al.) + Linear, trained with ERM.
# Network-axis comparison: a multi-scale convolutional plus Transformer network
# on the same EA-aligned ERM setup as the other backbones.
aligner: EA
augmenter: Identity
backbone: MSVTNet
head: Linear
strategy: ERM
epochs: 100
batch_size: 32
lr: 0.001
