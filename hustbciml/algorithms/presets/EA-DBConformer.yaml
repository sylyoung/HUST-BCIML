# EA + DBConformer (Wang et al.) + Linear, trained with ERM.
# Network-axis comparison: a dual-branch (temporal + spatial) convolutional
# transformer on the same EA-aligned ERM setup as the other backbones.
aligner: EA
augmenter: Identity
backbone: DBConformer
head: Linear
strategy: ERM
epochs: 100
batch_size: 32
lr: 0.001
