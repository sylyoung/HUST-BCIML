# EA + SlimSeiz (Lu et al.) + Linear, trained with ERM.
# Network-axis comparison: a lightweight multi-branch 1D convolutional network
# with a single Mamba selective-state-space mixer, on the same EA-aligned ERM
# setup as the other backbones.
aligner: EA
augmenter: Identity
backbone: SlimSeiz
head: Linear
strategy: ERM
epochs: 100
batch_size: 32
lr: 0.001
