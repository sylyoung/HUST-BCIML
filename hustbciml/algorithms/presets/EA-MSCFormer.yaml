# EA + MSCFormer (Zhao et al.) + Linear, trained with ERM.
# Network-axis comparison: a multi-scale convolutional transformer that fuses
# three temporal-conv scales into class-token features, on the same EA-aligned
# ERM setup as the other backbones.
aligner: EA
augmenter: Identity
backbone: MSCFormer
head: Linear
strategy: ERM
epochs: 100
batch_size: 32
lr: 0.001
