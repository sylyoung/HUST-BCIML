# MVCNet — Multi-View Contrastive Network (Wang et al., 2025, Knowledge-Based Systems).
# Dual-branch (CNN + Transformer) MI decoder trained with multi-view augmentation,
# a classification loss, and two NT-Xent contrastive losses: cross-view (CVC) and
# cross-model (CMC). The CNN branch is the IFNet backbone; at inference only that
# branch + the linear head are used.
aligner: EA
augmenter: Identity          # the 3 views are generated inside the strategy
backbone: IFNet
head: Linear
strategy: MVCNet
epochs: 100
batch_size: 64
lr: 0.001
