# FedAvg — federated averaging baseline (McMahan et al., 2017). Same privacy-
# preserving federated schedule as FedBS (200 rounds, P=0.5, E=2, SGD mom 0.9) but
# with standard BN and no SAM, so it isolates FedBS's two additions. EA-aligned
# EEGNet, one shared backbone with the centralized reference. Optimizer knobs match
# the shared 4-class scenario (lr 0.001, weight_decay 0.0, batch 32) — identical to
# Centralized Training and FedBS so only the privacy mechanism differs.
aligner: EA
augmenter: Identity
backbone: EEGNet
head: Linear
strategy: FedAvg
batch_size: 32
lr: 0.001
weight_decay: 0.0
test_batch: 8
