# Tent: EA-aligned EEGNet source model, adapted online at test time by entropy
# minimization over the BatchNorm affine parameters (Wang et al., ICLR 2021).
aligner: EA
augmenter: Identity
backbone: EEGNet
head: Linear
strategy: Tent
epochs: 100
batch_size: 32
lr: 0.001
test_batch: 8
steps: 1
stride: 1
